# wrangler.toml — Region Resonances embedding proxy
#
# Requires Wrangler 4.36.0 or later (for the rate-limit binding).
#
# Setup:
#   1. npm install
#   2. npx wrangler login
#   3. npx wrangler secret put OPENAI_API_KEY
#      (paste your sk-... key when prompted; stored encrypted)
#   4. npx wrangler deploy
#
# Local dev:
#   npx wrangler dev
#   Note: rate-limit counters in `wrangler dev` are local-only.

name = "region-resonances-proxy"
main = "src/index.js"
compatibility_date = "2025-09-23"

# Rate limiting: 10 requests per 60 seconds per client IP.
#
# Cloudflare's docs recommend rate-limiting on stable per-user identifiers
# (API keys, user IDs) rather than IPs, because IPs can be shared across
# many users on mobile networks or shared proxies. We don't have user IDs
# here — anonymous queries from a public web app — so IP is our best
# available signal. The 10/min window is loose enough that legitimate
# debounced typing won't trip it, while still rejecting scrape attempts.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 10
period = 60

# OPENAI_API_KEY is intentionally NOT defined here. Set it as an encrypted
# secret with `npx wrangler secret put OPENAI_API_KEY`.
